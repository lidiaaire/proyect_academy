services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/elevate_campus
      JWT_SECRET: ${JWT_SECRET:-cambia_este_valor_en_produccion}
      JWT_TTL_ADMIN: ${JWT_TTL_ADMIN:-8h}
      JWT_TTL_TEACHER: ${JWT_TTL_TEACHER:-24h}
      JWT_TTL_STUDENT: ${JWT_TTL_STUDENT:-7d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
