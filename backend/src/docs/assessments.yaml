openapi: 3.0.3

info:
  title: Elevate Your English — Assessments API
  version: 1.0.0

tags:
  - name: Assessments
    description: >
      Gestión del assessment de una unidad y de los intentos (Attempt) de
      los alumnos. Montado bajo
      `/api/courses/:courseId/units/:unitId/assessment` (singular — un único
      Assessment por unidad; mergeParams a través de Units). Los endpoints
      de CRUD no incluyen `:id` en la ruta porque el Assessment se identifica
      unívocamente por `unitId`.

paths:

  /api/courses/{courseId}/units/{unitId}/assessment:
    get:
      tags: [Assessments]
      summary: Obtener el assessment de una unidad
      description: >
        Devuelve el Assessment de la unidad indicada, envuelto en
        `{ assessment }`.

        **Caso especial:** si la unidad no tiene ningún assessment, el
        service devuelve `null` directamente (no lanza 404); el controller
        responde **200 con `{ assessment: null }`**. Este comportamiento
        es intencionado para que los clientes puedan comprobar la
        existencia de un assessment sin esperar un 404.

        Restricciones de autorización y negocio según rol:
        - **ADMIN**: sin restricciones; `correctIndex` de cada pregunta
          **sí se incluye** en la respuesta (es el único rol que lo recibe).
        - **TEACHER**: requiere curso `published` → 403
          `COURSE_NOT_PUBLISHED`. `correctIndex` **nunca** se incluye
          (`select: false` en el modelo).
        - **STUDENT**: requiere curso `published` → 403
          `COURSE_NOT_PUBLISHED`; requiere matrícula activa → 403
          `NOT_ENROLLED`; requiere **todas las lecciones de la unidad
          completadas** → 403 `LESSONS_INCOMPLETE`. `correctIndex` nunca
          se incluye.

        El orden real de comprobaciones para STUDENT es: curso publicado →
        unidad existe → matrícula activa → todas las lecciones completadas
        → devuelve assessment (o null).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/courseId"
        - $ref: "#/components/parameters/unitId"
      responses:
        "200":
          description: >
            Assessment encontrado (o `{ assessment: null }` si la unidad
            no tiene assessment).
          content:
            application/json:
              schema:
                type: object
                properties:
                  assessment:
                    oneOf:
                      - $ref: "#/components/schemas/Assessment"
                      - type: "null"
              examples:
                conAssessment:
                  summary: Unidad con assessment (TEACHER, sin correctIndex)
                  value:
                    assessment:
                      _id: "665d1c2d3e4f5a6b7c8d9e0f"
                      unitId: "665b1a2b3c4d5e6f7a8b9c01"
                      courseId: "662d0a1b2c3d4e5f6a7b8c9c"
                      title: "Evaluación de la unidad"
                      description: null
                      passingScore: 70
                      maxAttempts: 3
                      questions:
                        - _id: "665d1c2d3e4f5a6b7c8d9e10"
                          text: "¿Cuál es la opción correcta?"
                          options: ["A", "B", "C"]
                          points: 1
                      createdAt: "2026-01-10T09:15:00.000Z"
                      updatedAt: "2026-01-10T09:15:00.000Z"
                conAssessmentAdmin:
                  summary: Unidad con assessment (ADMIN, con correctIndex)
                  value:
                    assessment:
                      _id: "665d1c2d3e4f5a6b7c8d9e0f"
                      unitId: "665b1a2b3c4d5e6f7a8b9c01"
                      courseId: "662d0a1b2c3d4e5f6a7b8c9c"
                      title: "Evaluación de la unidad"
                      description: null
                      passingScore: 70
                      maxAttempts: 3
                      questions:
                        - _id: "665d1c2d3e4f5a6b7c8d9e10"
                          text: "¿Cuál es la opción correcta?"
                          options: ["A", "B", "C"]
                          correctIndex: 1
                          points: 1
                      createdAt: "2026-01-10T09:15:00.000Z"
                      updatedAt: "2026-01-10T09:15:00.000Z"
                sinAssessment:
                  summary: Unidad sin assessment
                  value:
                    assessment: null
        "400":
          $ref: "#/components/responses/InvalidParams"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Curso no publicado, student no matriculado, o lecciones incompletas.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                notPublished:
                  summary: Curso no publicado (TEACHER/STUDENT)
                  value:
                    error: "COURSE_NOT_PUBLISHED"
                    message: "El curso no está disponible"
                notEnrolled:
                  summary: STUDENT sin matrícula activa
                  value:
                    error: "NOT_ENROLLED"
                    message: "No tienes matrícula activa en este curso"
                lessonsIncomplete:
                  summary: STUDENT con lecciones sin completar
                  value:
                    error: "LESSONS_INCOMPLETE"
                    message: "Debes completar todas las lecciones de la unidad primero"
        "404":
          $ref: "#/components/responses/CourseOrUnitNotFound"

    post:
      tags: [Assessments]
      summary: Crear el assessment de una unidad
      description: >
        Crea el Assessment de la unidad indicada. `unitId` y `courseId` se
        toman de los parámetros de ruta y están **prohibidos en el body**
        (400 si se envían). `points` por pregunta no se acepta en el body
        (no está en `createAssessmentSchema`); el modelo usa `default: 1`.

        Restricciones de negocio:
        - Solo se permite en cursos `draft` o `published` → 403
          `COURSE_ARCHIVED` si el curso está `archived`.
        - La unidad debe existir dentro del curso → 404 `UNIT_NOT_FOUND`.
        - Solo puede existir un Assessment por unidad → 409
          `ASSESSMENT_EXISTS` si ya hay uno.

        Solo accesible por ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/courseId"
        - $ref: "#/components/parameters/unitId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssessmentInput"
            example:
              title: "Evaluación de la unidad"
              description: "Pon a prueba lo aprendido."
              passingScore: 70
              maxAttempts: 3
              questions:
                - text: "¿Cuál es la forma correcta del presente simple?"
                  options: ["He go", "He goes", "He going"]
                  correctIndex: 1
      responses:
        "201":
          description: Assessment creado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  assessment:
                    $ref: "#/components/schemas/Assessment"
        "400":
          description: "`courseId`/`unitId` inválidos, datos de entrada inválidos, o se incluyó `unitId`/`courseId` en el body."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                validationError:
                  summary: Campo inválido
                  value:
                    error: "VALIDATION_ERROR"
                    message: "Datos de entrada inválidos"
                    fields:
                      - field: "questions"
                        message: "questions debe ser un array con al menos una pregunta"
                bodyIdForbidden:
                  summary: Se envió unitId o courseId en el body
                  value:
                    error: "VALIDATION_ERROR"
                    message: "Datos de entrada inválidos"
                    fields:
                      - field: "unitId"
                        message: "unitId es asignado automáticamente por la ruta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Rol no es ADMIN, o el curso está `archived`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                insufficientRole:
                  summary: Rol no permitido en la ruta
                  value:
                    error: "INSUFFICIENT_ROLE"
                    message: "No tienes permiso para realizar esta acción"
                courseArchived:
                  summary: Curso archivado
                  value:
                    error: "COURSE_ARCHIVED"
                    message: "No se pueden añadir assessments a un curso archivado"
        "404":
          $ref: "#/components/responses/CourseOrUnitNotFound"
        "409":
          description: La unidad ya tiene un Assessment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "ASSESSMENT_EXISTS"
                message: "Esta unidad ya tiene un assessment"

    patch:
      tags: [Assessments]
      summary: Actualizar el assessment de una unidad
      description: >
        Actualiza campos del Assessment (`title`, `description`,
        `passingScore`, `maxAttempts`, `questions`). `unitId` y `courseId`
        están **prohibidos en el body** (400 si se envían).

        Si se envía `questions`, el array **reemplaza completamente** el
        existente (no merge parcial). Los `_id` de los subdocumentos de
        pregunta se regeneran, lo que invalida las referencias en
        `AssessmentAttempt.answers[].questionId` previos — diseño conocido,
        no un error evitable en este endpoint.

        **Sin restricción de `status` del curso**: se puede actualizar el
        assessment de un curso en cualquier estado (`draft`, `published`,
        `archived`).

        Solo accesible por ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/courseId"
        - $ref: "#/components/parameters/unitId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssessmentInput"
            example:
              passingScore: 80
              questions:
                - text: "¿Cuál es la forma correcta del pasado simple?"
                  options: ["He goed", "He went", "He go"]
                  correctIndex: 1
      responses:
        "200":
          description: Assessment actualizado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  assessment:
                    $ref: "#/components/schemas/Assessment"
        "400":
          $ref: "#/components/responses/InvalidParams"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/AdminOnly"
        "404":
          description: No existe el curso, la unidad, o el assessment de esa unidad.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                courseNotFound:
                  summary: Curso no encontrado
                  value:
                    error: "COURSE_NOT_FOUND"
                    message: "Curso no encontrado"
                unitNotFound:
                  summary: Unidad no encontrada
                  value:
                    error: "UNIT_NOT_FOUND"
                    message: "Unidad no encontrada"
                assessmentNotFound:
                  summary: Assessment no encontrado
                  value:
                    error: "ASSESSMENT_NOT_FOUND"
                    message: "Assessment no encontrado"

    delete:
      tags: [Assessments]
      summary: Eliminar el assessment de una unidad
      description: >
        Elimina el Assessment y todos sus `AssessmentAttempt` en cascada.

        Solo se permite si el curso está en `draft` → 403
        `CANNOT_DELETE_ASSESSMENT` en cualquier otro estado.

        Solo accesible por ADMIN.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/courseId"
        - $ref: "#/components/parameters/unitId"
      responses:
        "204":
          description: Assessment (y sus AssessmentAttempt) eliminado. Sin contenido en la respuesta.
        "400":
          $ref: "#/components/responses/InvalidParams"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Rol no es ADMIN, o el curso no está en `draft`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                insufficientRole:
                  summary: Rol no permitido
                  value:
                    error: "INSUFFICIENT_ROLE"
                    message: "No tienes permiso para realizar esta acción"
                cannotDelete:
                  summary: Curso no está en draft
                  value:
                    error: "CANNOT_DELETE_ASSESSMENT"
                    message: "Solo se pueden eliminar assessments de cursos en estado draft"
        "404":
          description: No existe el curso, la unidad, o el assessment de esa unidad.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                courseNotFound:
                  summary: Curso no encontrado
                  value:
                    error: "COURSE_NOT_FOUND"
                    message: "Curso no encontrado"
                unitNotFound:
                  summary: Unidad no encontrada
                  value:
                    error: "UNIT_NOT_FOUND"
                    message: "Unidad no encontrada"
                assessmentNotFound:
                  summary: Assessment no encontrado
                  value:
                    error: "ASSESSMENT_NOT_FOUND"
                    message: "Assessment no encontrado"

  /api/courses/{courseId}/units/{unitId}/assessment/attempts:
    post:
      tags: [Assessments]
      summary: Enviar un intento (submitAttempt)
      description: >
        Registra un intento del alumno autenticado sobre el Assessment de
        la unidad. `score` y `passed` se calculan siempre en el servidor;
        el cliente nunca puede enviarlos.

        Precondiciones (en orden):
        1. La unidad indicada debe existir dentro del `courseId` → 404
           `UNIT_NOT_FOUND` si no.
        2. El alumno debe tener matrícula **activa** en el curso → 403
           `NOT_ENROLLED`.
        3. Todas las lecciones de la unidad deben estar completadas → 403
           `LESSONS_INCOMPLETE` (si la unidad tiene lecciones; si no tiene
           ninguna, este check se omite).
        4. El Assessment debe existir → 404 `ASSESSMENT_NOT_FOUND`.
        5. El número de intentos previos no puede alcanzar `maxAttempts`
           → 403 `MAX_ATTEMPTS_REACHED`.
        6. El alumno no puede haber superado ya el assessment (`passed:
           true` en algún intento previo) → 403 `ALREADY_PASSED`.

        Cálculo del `score`:
        `score = floor((earned_points / total_points) * 100)` donde cada
        pregunta acumula sus `points` (default 1) si `answers[i]` coincide
        con `correctIndex` de la pregunta en la misma posición `i`.

        Solo accesible por STUDENT.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/courseId"
        - $ref: "#/components/parameters/unitId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  minItems: 1
                  description: >
                    Índice de opción elegida para cada pregunta, en el
                    mismo orden que `questions` del Assessment. Cada
                    elemento es un entero ≥ 0.
                  items:
                    type: integer
                    minimum: 0
                  example: [1, 0, 2]
      responses:
        "201":
          description: Intento registrado. Devuelve el documento `AssessmentAttempt` completo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempt:
                    $ref: "#/components/schemas/AssessmentAttempt"
              example:
                attempt:
                  _id: "665e2d3e4f5a6b7c8d9e0f10"
                  assessmentId: "665d1c2d3e4f5a6b7c8d9e0f"
                  studentId: "663e0a1b2c3d4e5f6a7b8c9d"
                  attemptNumber: 1
                  answers:
                    - questionId: "665d1c2d3e4f5a6b7c8d9e10"
                      selected: 1
                      isCorrect: true
                  score: 100
                  passed: true
                  submittedAt: "2026-06-30T11:00:00.000Z"
        "400":
          description: "`courseId`/`unitId` inválidos, o `answers` ausente/vacío/con valores no enteros."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "VALIDATION_ERROR"
                message: "Datos de entrada inválidos"
                fields:
                  - field: "answers"
                    message: "answers debe ser un array con al menos una respuesta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Rol no es STUDENT, o alguna precondición de negocio no se cumple.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                insufficientRole:
                  summary: Rol no es STUDENT
                  value:
                    error: "INSUFFICIENT_ROLE"
                    message: "No tienes permiso para realizar esta acción"
                notEnrolled:
                  summary: Sin matrícula activa en el curso
                  value:
                    error: "NOT_ENROLLED"
                    message: "No tienes matrícula activa en este curso"
                lessonsIncomplete:
                  summary: Lecciones de la unidad no completadas
                  value:
                    error: "LESSONS_INCOMPLETE"
                    message: "Debes completar todas las lecciones de la unidad primero"
                maxAttemptsReached:
                  summary: Se alcanzó el límite de intentos
                  value:
                    error: "MAX_ATTEMPTS_REACHED"
                    message: "Has alcanzado el máximo de 3 intentos"
                alreadyPassed:
                  summary: Ya superó el assessment
                  value:
                    error: "ALREADY_PASSED"
                    message: "Ya has superado este assessment"
        "404":
          description: La unidad no existe en este curso, o la unidad no tiene assessment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                unitNotFound:
                  summary: Unidad no encontrada (o no pertenece a este curso)
                  value:
                    error: "UNIT_NOT_FOUND"
                    message: "Unidad no encontrada"
                assessmentNotFound:
                  summary: La unidad no tiene assessment
                  value:
                    error: "ASSESSMENT_NOT_FOUND"
                    message: "Assessment no encontrado"

    get:
      tags: [Assessments]
      summary: Listar intentos del assessment
      description: >
        Devuelve los intentos realizados sobre el Assessment de la unidad.

        **La forma de la respuesta difiere según el rol** (inconsistencia
        real del backend, no un error):

        - **STUDENT**: `{ attempts: [AttemptDoc, ...] }` — array plano
          con solo los intentos del propio alumno, ordenados por
          `attemptNumber` ascendente. Requiere matrícula activa → 403
          `NOT_ENROLLED`.
        - **ADMIN y TEACHER**: `{ attempts: { docs: [...], total: N } }`
          — objeto paginado (`BaseRepository.findAll` con defaults
          `limit=20, sort={createdAt:-1}`) con **todos** los intentos del
          assessment, de cualquier alumno. Sin restricción de scope para
          TEACHER (puede ver intentos de alumnos no asignados a él).

        En ambos casos se requiere `verifyToken`. No hay `requireRole`
        en la ruta (cualquier rol autenticado puede llamar a este endpoint).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/courseId"
        - $ref: "#/components/parameters/unitId"
      responses:
        "200":
          description: Intentos según el rol del actor.
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempts:
                    oneOf:
                      - type: array
                        description: Respuesta para STUDENT (array plano).
                        items:
                          $ref: "#/components/schemas/AssessmentAttempt"
                      - type: object
                        description: Respuesta para ADMIN/TEACHER (objeto paginado).
                        properties:
                          docs:
                            type: array
                            items:
                              $ref: "#/components/schemas/AssessmentAttempt"
                          total:
                            type: integer
              examples:
                comoStudent:
                  summary: Respuesta para STUDENT
                  value:
                    attempts:
                      - _id: "665e2d3e4f5a6b7c8d9e0f10"
                        assessmentId: "665d1c2d3e4f5a6b7c8d9e0f"
                        studentId: "663e0a1b2c3d4e5f6a7b8c9d"
                        attemptNumber: 1
                        answers:
                          - questionId: "665d1c2d3e4f5a6b7c8d9e10"
                            selected: 1
                            isCorrect: true
                        score: 100
                        passed: true
                        submittedAt: "2026-06-30T11:00:00.000Z"
                comoAdmin:
                  summary: Respuesta para ADMIN/TEACHER
                  value:
                    attempts:
                      docs:
                        - _id: "665e2d3e4f5a6b7c8d9e0f10"
                          assessmentId: "665d1c2d3e4f5a6b7c8d9e0f"
                          studentId: "663e0a1b2c3d4e5f6a7b8c9d"
                          attemptNumber: 1
                          answers:
                            - questionId: "665d1c2d3e4f5a6b7c8d9e10"
                              selected: 1
                              isCorrect: true
                          score: 100
                          passed: true
                          submittedAt: "2026-06-30T11:00:00.000Z"
                      total: 1
        "400":
          $ref: "#/components/responses/InvalidParams"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: STUDENT sin matrícula activa en el curso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "NOT_ENROLLED"
                message: "No tienes matrícula activa en este curso"
        "404":
          description: No existe el curso, la unidad, o el assessment de esa unidad.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                unitNotFound:
                  summary: Unidad no encontrada
                  value:
                    error: "UNIT_NOT_FOUND"
                    message: "Unidad no encontrada"
                assessmentNotFound:
                  summary: Assessment no encontrado
                  value:
                    error: "ASSESSMENT_NOT_FOUND"
                    message: "Assessment no encontrado"

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    courseId:
      name: courseId
      in: path
      required: true
      description: ObjectId del Course.
      schema:
        type: string
        example: "662d0a1b2c3d4e5f6a7b8c9c"
    unitId:
      name: unitId
      in: path
      required: true
      description: ObjectId de la Unit.
      schema:
        type: string
        example: "665b1a2b3c4d5e6f7a8b9c01"

  responses:
    Unauthorized:
      description: Token de autenticación ausente o inválido.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "TOKEN_MISSING"
            message: "Token de autenticación requerido"
    AdminOnly:
      description: El rol del usuario autenticado no es ADMIN.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "INSUFFICIENT_ROLE"
            message: "No tienes permiso para realizar esta acción"
    InvalidParams:
      description: "`courseId` o `unitId` no son un ObjectId de MongoDB válido."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "VALIDATION_ERROR"
            message: "Datos de entrada inválidos"
            fields:
              - field: "unitId"
                message: "El unitId debe ser un ObjectId de MongoDB válido"
    CourseOrUnitNotFound:
      description: No existe el curso o no existe la unidad dentro de ese curso.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            courseNotFound:
              summary: Curso no encontrado
              value:
                error: "COURSE_NOT_FOUND"
                message: "Curso no encontrado"
            unitNotFound:
              summary: Unidad no encontrada
              value:
                error: "UNIT_NOT_FOUND"
                message: "Unidad no encontrada"

  schemas:
    Question:
      type: object
      properties:
        _id:
          type: string
          example: "665d1c2d3e4f5a6b7c8d9e10"
        text:
          type: string
          maxLength: 500
          example: "¿Cuál es la forma correcta del presente simple?"
        options:
          type: array
          minItems: 2
          maxItems: 4
          items:
            type: string
          example: ["He go", "He goes", "He going"]
        correctIndex:
          type: integer
          minimum: 0
          description: >
            Índice de la opción correcta dentro de `options`. Oculto por
            defecto (`select: false`); solo incluido en la respuesta cuando
            el actor es ADMIN.
          example: 1
        points:
          type: integer
          minimum: 1
          description: Peso de la pregunta en el cálculo del score. Default 1.
          example: 1

    QuestionInput:
      type: object
      required: [text, options, correctIndex]
      properties:
        text:
          type: string
          maxLength: 500
          example: "¿Cuál es la forma correcta del presente simple?"
        options:
          type: array
          minItems: 2
          maxItems: 4
          items:
            type: string
          example: ["He go", "He goes", "He going"]
        correctIndex:
          type: integer
          minimum: 0
          description: Debe ser un índice válido dentro de `options`.
          example: 1

    Assessment:
      type: object
      properties:
        _id:
          type: string
          example: "665d1c2d3e4f5a6b7c8d9e0f"
        unitId:
          type: string
          example: "665b1a2b3c4d5e6f7a8b9c01"
        courseId:
          type: string
          description: Denormalizado desde la Unit.
          example: "662d0a1b2c3d4e5f6a7b8c9c"
        title:
          type: string
          minLength: 3
          maxLength: 100
          example: "Evaluación de la unidad"
        description:
          type: string
          nullable: true
          maxLength: 500
          example: null
        passingScore:
          type: integer
          minimum: 1
          maximum: 100
          description: Porcentaje mínimo para considerar el assessment superado. Default 70.
          example: 70
        maxAttempts:
          type: integer
          minimum: 1
          description: Número máximo de intentos permitidos por alumno. Default 3.
          example: 3
        questions:
          type: array
          minItems: 1
          description: >
            `correctIndex` solo aparece cuando el actor es ADMIN (campo
            con `select: false` en el modelo).
          items:
            $ref: "#/components/schemas/Question"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateAssessmentInput:
      type: object
      required: [title, questions]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 100
          example: "Evaluación de la unidad"
        description:
          type: string
          nullable: true
          maxLength: 500
          example: "Pon a prueba lo aprendido."
        passingScore:
          type: integer
          minimum: 1
          maximum: 100
          description: Default 70 si se omite.
          example: 70
        maxAttempts:
          type: integer
          minimum: 1
          description: Default 3 si se omite.
          example: 3
        questions:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/QuestionInput"

    UpdateAssessmentInput:
      type: object
      description: >
        Todos los campos son opcionales. `unitId` y `courseId` no están
        permitidos (400 si se envían). Si se envía `questions`, reemplaza
        el array completo (no merge).
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 100
          example: "Evaluación revisada"
        description:
          type: string
          nullable: true
          maxLength: 500
          example: "Nueva descripción."
        passingScore:
          type: integer
          minimum: 1
          maximum: 100
          example: 80
        maxAttempts:
          type: integer
          minimum: 1
          example: 2
        questions:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/QuestionInput"

    AssessmentAttempt:
      type: object
      properties:
        _id:
          type: string
          example: "665e2d3e4f5a6b7c8d9e0f10"
        assessmentId:
          type: string
          example: "665d1c2d3e4f5a6b7c8d9e0f"
        studentId:
          type: string
          example: "663e0a1b2c3d4e5f6a7b8c9d"
        attemptNumber:
          type: integer
          minimum: 1
          description: Calculado en el servidor como `count_previos + 1`.
          example: 1
        answers:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: string
                example: "665d1c2d3e4f5a6b7c8d9e10"
              selected:
                type: integer
                minimum: 0
                description: Índice de opción elegida por el alumno.
                example: 1
              isCorrect:
                type: boolean
                description: Calculado en el servidor.
                example: true
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Calculado en el servidor. NUNCA enviado por el cliente.
          example: 100
        passed:
          type: boolean
          description: "`score >= assessment.passingScore`. Calculado en el servidor."
          example: true
        submittedAt:
          type: string
          format: date-time
          description: Inmutable. Default `Date.now`.

    Error:
      type: object
      properties:
        error:
          type: string
          example: "ASSESSMENT_NOT_FOUND"
        message:
          type: string
          example: "Assessment no encontrado"
        fields:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
